name: newfoot

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${DB_NAME:-newfoot}
      MYSQL_USER: ${DB_USER:-newfoot}
      MYSQL_PASSWORD: ${DB_PASSWORD:-newfoot}
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot",
         "-p${MYSQL_ROOT_PASSWORD:-rootpw}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-newfoot}
      DB_USER: ${DB_USER:-newfoot}
      DB_PASSWORD: ${DB_PASSWORD:-newfoot}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${BACKEND_HOST_PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 45s

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_HOST_PORT:-4200}:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 60s

volumes:
  mysql-data:
